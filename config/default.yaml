# SOC Toolkit - default configuration

# Detection thresholds
brute_force_threshold:  5
brute_force_window_sec: 1800

spray_threshold:        10
spray_window_sec:       300

# Allowlist
allowed_ips:
  # - 10.0.0.1
  # - 192.168.1.100

allowed_users:
  # - nagios
  # - prometheus

# Output
max_events_per_finding: 100

# Performance
stream_buffer_size: 10000

# GeoIP database paths (optional)
# Download free from maxmind.com
# geoip_city_db: config/geoip/GeoLite2-City.mmdb
# geoip_asn_db:  config/geoip/GeoLite2-ASN.mmdb
